<style>
  :root {
    --ink: #1A1A1A;
    --lime: #9BBF00;
    --paper: #F5F5F3;
    --line: #2E2E2E;
    --err: #FF6B57;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #gate {
    width: 100%;
    max-width: 380px;
    padding: 40px 32px;
  }
  #mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
  }
  #mark .dot {
    width: 10px; height: 10px;
    background: var(--lime);
    border-radius: 50%;
    flex: none;
  }
  #mark span {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #9A9A96;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  p.sub {
    font-size: 13px;
    color: #9A9A96;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #9A9A96;
    margin-bottom: 8px;
  }
  #pw {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--paper);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    padding: 10px 2px;
    outline: none;
    letter-spacing: 0.03em;
  }
  #pw:focus { border-bottom-color: var(--lime); }
  #row { display: flex; align-items: center; gap: 14px; margin-top: 28px; }
  button {
    background: var(--lime);
    color: var(--ink);
    border: none;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 22px;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity 0.15s ease;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    font-size: 13px;
    color: #9A9A96;
    min-height: 18px;
  }
  #status.error { color: var(--err); }
  #gate.shake { animation: shake 0.32s ease; }
  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  #frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  #frame.visible { display: block; }
  #gate.hidden { display: none; }
</style>

<script>
(function () {
  const payload = JSON.parse(document.getElementById('payload').textContent);
  const ITERATIONS = 250000;

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  const salt = b64ToBytes(payload.salt);
  const iv = b64ToBytes(payload.iv);
  const data = b64ToBytes(payload.data);

  const gate = document.getElementById('gate');
  const pwInput = document.getElementById('pw');
  const status = document.getElementById('status');
  const goBtn = document.getElementById('go');
  const frame = document.getElementById('frame');

  async function tryUnlock() {
    const password = pwInput.value;
    if (!password) return;
    goBtn.disabled = true;
    status.textContent = 'Verifying…';
    status.className = '';
    try {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: ITERATIONS, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, data);
      const html = new TextDecoder().decode(plainBuf);

      // Use a blob: URL rather than srcdoc. An srcdoc iframe's default base URL
      // is the OUTER page's URL, so plain "#fragment" links inside the decrypted
      // document resolve back to the live (locked) page and force a reload,
      // re-showing this gate. A blob: URL gives the iframe its own real address,
      // so internal anchors resolve against that and just scroll, no reload.
      const blob = new Blob([html], { type: 'text/html' });
      const blobUrl = URL.createObjectURL(blob);
      frame.src = blobUrl;
      frame.classList.add('visible');
      gate.classList.add('hidden');
    } catch (e) {
      status.textContent = 'Incorrect passphrase. Try again.';
      status.className = 'error';
      gate.classList.remove('shake');
      void gate.offsetWidth;
      gate.classList.add('shake');
      goBtn.disabled = false;
    }
  }

  goBtn.addEventListener('click', tryUnlock);
  pwInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryUnlock();
  });
})();
</script>
